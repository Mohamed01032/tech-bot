<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechBot — Professional Technical Support</title>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    
    <!-- Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
    
    <style>
        /* Small inline fixes for copy button */
        .copy-code-btn {
            position: absolute;
            top: 8px;
            left: 8px;
            background: rgba(255, 255, 255, 0.1);
            border: none;
            color: white;
            padding: 4px 8px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            opacity: 0;
            transition: opacity 0.3s;
        }
        pre:hover .copy-code-btn {
            opacity: 1;
        }
        .copy-code-btn:hover {
            background: var(--accent-primary);
        }
    </style>
</head>
<body>

    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo-container">🤖</div>
                <div class="sidebar-title">
                    <h2>TechBot</h2>
                    <p>Advanced AI Support</p>
                </div>
            </div>
            
            <nav class="nav-links">
                <div class="nav-item active">
                    <span>💬</span>
                    <span>المحادثة الحالية</span>
                </div>
                <div class="nav-item" onclick="clearChat()">
                    <span>🗑️</span>
                    <span>مسح المحادثة</span>
                </div>
            </nav>
            
            <div class="sidebar-footer">
                <div class="nav-item" style="cursor: default; opacity: 0.7;">
                    <span>⚙️</span>
                    <span>v2.0 Professional</span>
                </div>
            </div>
        </aside>

        <!-- Chat Main Area -->
        <main class="chat-area">
            <header class="chat-header">
                <div class="header-left">
                    <h3>مركز الدعم التقني</h3>
                </div>
                <div class="status">
                    <span>متصل</span>
                    <div class="status-dot"></div>
                </div>
            </header>

            <div class="chat-messages" id="chat-messages">
                <!-- Messages will be injected here -->
            </div>

            <div class="input-container">
                <div class="input-wrapper">
                    <textarea id="user-input" placeholder="كيف يمكنني مساعدتك تقنياً اليوم؟" rows="1"></textarea>
                    <div class="action-buttons">
                        <button class="send-btn" id="send-btn">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <line x1="22" y1="2" x2="11" y2="13"></line>
                                <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                            </svg>
                        </button>
                    </div>
                </div>
                <p style="text-align: center; font-size: 11px; color: var(--text-muted); margin-top: 12px;">
                    اضغط Enter للإرسال | Shift + Enter لسطر جديد
                </p>
            </div>
        </main>
    </div>

    <!-- Custom JS -->
    <script src="{{ url_for('static', filename='js/chat.js') }}"></script>
</body>
</html>
